
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lanki — Submit Expense</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='4' width='24' height='6' rx='2' fill='%23021751'/%3E%3Crect x='4' y='13' width='16' height='6' rx='2' fill='%23021751'/%3E%3Crect x='4' y='22' width='20' height='6' rx='2' fill='%23021751'/%3E%3C/svg%3E">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    /* Lanki Brand Tokens */
    --midnight:#021751;--electric:#0077C1;
    --feather:#F3F1EF;--bg:#FFFFFF;--bg2:#F3F1EF;
    --border:#E4E0DC;--text:#021751;--text2:#707070;--text3:#9CA0A8;
    --ok:#3D6B4F;--bad:#8B4040;--warn:#7A5E20;
    --r:10px;--rsm:7px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif;
  }
  /* Lanki uses system sans-serif per brand guidelines */
  html,body{min-height:100vh;background:var(--feather);font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased}
  .wrap{max-width:420px;margin:0 auto;padding:2rem 1.25rem 4rem}
  .logo{text-align:center;margin-bottom:2rem}
  .logo-mark{font-size:28px;font-weight:700;color:var(--midnight);letter-spacing:-.04em}
  .logo-mark em{font-style:italic;color:var(--electric)}
  .logo-tag{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-top:4px}
  .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem}
  .title{font-size:18px;font-weight:600;margin-bottom:4px;letter-spacing:-.02em}
  .sub{font-size:13px;color:var(--text3);margin-bottom:1.5rem;line-height:1.5}
  .lbl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.04em}
  .field{margin-bottom:1rem}
  input,select,textarea{
    width:100%;padding:11px 13px;
    border:1.5px solid var(--border);border-radius:var(--rsm);
    font-size:15px;background:var(--bg);color:var(--text);
    font-family:var(--font);transition:border-color .12s;
    -webkit-appearance:none;appearance:none;
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--midnight);box-shadow:0 0 0 3px rgba(2,23,81,.08)}
  input[type="number"]{font-size:22px;font-weight:600;letter-spacing:-.02em}
  .pin-wrap{display:flex;gap:10px;justify-content:center;margin-bottom:1.5rem}
  .pin-digit{
    width:60px;height:70px;border:2px solid var(--border);border-radius:var(--r);
    font-size:28px;font-weight:700;text-align:center;
    background:var(--bg);color:var(--midnight);font-family:var(--font);
    -webkit-appearance:none;appearance:none;
    transition:border-color .12s;
  }
  .pin-digit:focus{outline:none;border-color:var(--midnight);box-shadow:0 0 0 3px rgba(2,23,81,.08)}
  .btn{
    width:100%;padding:14px;border:none;border-radius:var(--rsm);
    font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);
    transition:all .15s;letter-spacing:-.01em;
  }
  .btn-primary{background:var(--electric);color:#fff} /* Electric Blue — brand action */
  .btn-primary:hover{opacity:.9}
  .btn-primary:active{transform:scale(.98)}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .err{color:#9B2020;font-size:13px;margin-top:6px;padding:8px 12px;background:#FEE2E2;border-radius:var(--rsm);display:none}
  .success-screen{text-align:center;padding:2rem 1rem;display:none}
  .success-icon{font-size:56px;margin-bottom:1rem}
  .success-title{font-size:20px;font-weight:700;color:var(--midnight);margin-bottom:6px}
  .success-sub{font-size:14px;color:var(--text3);margin-bottom:1.5rem;line-height:1.6}
  .amount-prefix{display:flex;align-items:center;gap:0}
  .prefix-label{
    padding:11px 12px;background:var(--bg2);border:1.5px solid var(--border);
    border-right:none;border-radius:var(--rsm) 0 0 var(--rsm);
    font-size:13px;font-weight:600;color:var(--text3);white-space:nowrap;
  }
  .amount-prefix input{border-radius:0 var(--rsm) var(--rsm) 0}
  .spin{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div style="display:flex;align-items:center;gap:12px;justify-content:center">
        <svg width="28" height="23" viewBox="0 0 28 23" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect y="0" width="28" height="5.5" rx="1.5" fill="#021751"/>
          <rect y="8.75" width="18" height="5.5" rx="1.5" fill="#021751"/>
          <rect y="17.5" width="23" height="5.5" rx="1.5" fill="#021751"/>
        </svg>
        <div class="logo-mark">lanki platform</div>
      </div>
    <div class="logo-tag">Reimbursement Requests</div>
  </div>

  <!-- PIN SCREEN -->
  <div id="pin-screen" class="card">
    <div class="title">Enter your PIN</div>
    <div class="sub">Enter the 4-digit PIN given to you to submit expenses.</div>
    <div class="pin-wrap">
      <input class="pin-digit" type="password" inputmode="numeric" maxlength="1" id="p0" oninput="pinInput(this,0)">
      <input class="pin-digit" type="password" inputmode="numeric" maxlength="1" id="p1" oninput="pinInput(this,1)">
      <input class="pin-digit" type="password" inputmode="numeric" maxlength="1" id="p2" oninput="pinInput(this,2)">
      <input class="pin-digit" type="password" inputmode="numeric" maxlength="1" id="p3" oninput="pinInput(this,3)">
    </div>
    <div class="err" id="pin-err">Incorrect PIN. Please try again.</div>
    <button class="btn btn-primary" id="pin-btn" onclick="verifyPIN()">Continue</button>
  </div>

  <!-- SUBMIT FORM -->
  <div id="form-screen" style="display:none">
    <div class="card">
      <div class="title">Submit an expense</div>
      <div class="sub" id="form-welcome">Submitting as <strong id="submitter-label"></strong></div>

      <div class="grid2">
        <div class="field">
          <label class="lbl">Date</label>
          <input type="date" id="f-date">
        </div>
        <div class="field">
          <label class="lbl">Amount (SAR)</label>
          <div class="amount-prefix">
            <div class="prefix-label">SAR</div>
            <input type="number" id="f-amount" placeholder="0.00" min="0.01" step="0.01">
          </div>
        </div>
      </div>

      <div class="field">
        <label class="lbl">Description</label>
        <input type="text" id="f-desc" placeholder="What was it? e.g. Kids clothes from H&M">
      </div>

      <div class="field">
        <label class="lbl">Category</label>
        <select id="f-cat">
          <option value="food">Food & Dining</option>
          <option value="groceries">Groceries</option>
          <option value="kids">Kids & Family</option>
          <option value="clothing">Clothing</option>
          <option value="household">Household</option>
          <option value="health">Health & Pharmacy</option>
          <option value="entertainment">Entertainment</option>
          <option value="gifts">Gifts & Occasions</option>
          <option value="transport">Transport</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="field">
        <label class="lbl">Notes <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input type="text" id="f-notes" placeholder="Any additional context">
      </div>

      <div class="err" id="form-err"></div>
      <button class="btn btn-primary" id="submit-btn" onclick="submitExpense()">Submit Expense</button>
    </div>
  </div>

  <!-- SUCCESS SCREEN -->
  <div id="success-screen" class="card success-screen">
    <div class="success-icon">✅</div>
    <div class="success-title">Submitted!</div>
    <div class="success-sub" id="success-msg">Your expense has been submitted for review.</div>
    <button class="btn btn-primary" onclick="addAnother()">Submit another expense</button>
    <div style="font-size:12px;color:var(--text3);margin-top:12px" id="redirect-msg"></div>
  </div>
</div>

<script>
const SB='https://dgefsppkijrrvotggeom.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnZWZzcHBraWpycnZvdGdnZW9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MzYyOTAsImV4cCI6MjA5MTQxMjI5MH0._MWK5XL_CQAV3ybEWPv1UrArPb-Enu6FZognyImSYzg';
const SK='sb_publishable_TDlnbxsztjHHr1mJAnuLMA_2ogH_jMH';

let _submitterName='';
let _submitters=[];

// Set today's date as default
document.getElementById('f-date').value=new Date().toISOString().substr(0,10);

// Hash PIN
async function hashPIN(pin){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pin.trim()));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// Load submitters list from dashboard data (read-only via service proxy not needed — we store hashes in a public config row)
// We use a dedicated public config row in dashboard_data with id='submitters_public'
async function loadSubmitters(){
  try{
    const r=await fetch(`${SB}/rest/v1/dashboard_data?id=eq.submitters_public&select=payload`,{
      headers:{'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON}
    });
    if(r.ok){
      const d=await r.json();
      if(d?.length&&d[0]?.payload){
        const p=JSON.parse(d[0].payload);
        _submitters=p.submitters||[];
      }
    }
  }catch(e){console.error('Could not load submitters',e);}
}

// PIN input handling — auto-advance digits
function pinInput(el,idx){
  const val=el.value.replace(/[^0-9]/g,'');
  el.value=val;
  if(val&&idx<3)document.getElementById('p'+(idx+1)).focus();
  if(idx===3&&val)verifyPIN();
}

async function verifyPIN(){
  const pin=[0,1,2,3].map(i=>document.getElementById('p'+i).value).join('');
  if(pin.length<4){document.getElementById('pin-err').style.display='block';document.getElementById('pin-err').textContent='Please enter all 4 digits.';return;}
  const btn=document.getElementById('pin-btn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>Verifying…';
  await loadSubmitters();
  const hash=await hashPIN(pin);
  const match=_submitters.find(s=>s.pinHash===hash);
  btn.disabled=false;btn.innerHTML='Continue';
  if(match){
    _submitterName=match.name;
    document.getElementById('submitter-label').textContent=match.name;
    document.getElementById('pin-screen').style.display='none';
    document.getElementById('form-screen').style.display='block';
    document.getElementById('pin-err').style.display='none';
  }else{
    document.getElementById('pin-err').style.display='block';
    document.getElementById('pin-err').textContent='Incorrect PIN. Please try again.';
    [0,1,2,3].forEach(i=>{document.getElementById('p'+i).value='';});
    document.getElementById('p0').focus();
  }
}

async function submitExpense(){
  const date=document.getElementById('f-date').value;
  const amount=parseFloat(document.getElementById('f-amount').value);
  const desc=document.getElementById('f-desc').value.trim();
  const cat=document.getElementById('f-cat').value;
  const notes=document.getElementById('f-notes').value.trim();
  const errEl=document.getElementById('form-err');
  errEl.style.display='none';
  if(!date){errEl.textContent='Date is required.';errEl.style.display='block';return;}
  if(!amount||amount<=0){errEl.textContent='Enter a valid amount.';errEl.style.display='block';return;}
  if(!desc){errEl.textContent='Description is required.';errEl.style.display='block';return;}
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>Submitting…';
  try{
    const r=await fetch(`${SB}/rest/v1/pending_submissions`,{
      method:'POST',
      headers:{'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({
        submitter_name:_submitterName,
        submitted_at:new Date().toISOString(),
        amount,
        description:desc,
        category_hint:cat,
        notes,
        expense_date:date,
        status:'pending'
      })
    });
    if(!r.ok){const t=await r.text();throw new Error(t);}
    const safeDesc=desc.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    document.getElementById('success-msg').innerHTML=`<strong>${safeDesc}</strong> — SAR ${amount.toFixed(2)} recorded. Will be reviewed and approved shortly.`;
    document.getElementById('form-screen').style.display='none';
    document.getElementById('success-screen').style.display='block';
    startRedirect();
  }catch(e){
    errEl.textContent='Submission failed. Please try again. ('+e.message.substr(0,80)+')';
    errEl.style.display='block';
  }finally{
    btn.disabled=false;btn.innerHTML='Submit Expense';
  }
}

let _redirectTimer=null;
function addAnother(){
  if(_redirectTimer){clearInterval(_redirectTimer);_redirectTimer=null;}
  document.getElementById('success-screen').style.display='none';
  document.getElementById('form-screen').style.display='block';
  document.getElementById('f-amount').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('f-notes').value='';
  document.getElementById('f-date').value=new Date().toISOString().substr(0,10);
  document.getElementById('f-cat').value='food';
  document.getElementById('form-err').style.display='none';
  document.getElementById('f-amount').focus();
  window.scrollTo({top:0,behavior:'smooth'});
}
function startRedirect(){
  let secs=4;
  const msg=document.getElementById('redirect-msg');
  if(msg)msg.textContent='Returning to form in '+secs+'s…';
  _redirectTimer=setInterval(()=>{
    secs--;
    if(msg)msg.textContent=secs>0?'Returning to form in '+secs+'s…':'';
    if(secs<=0){clearInterval(_redirectTimer);_redirectTimer=null;addAnother();}
  },1000);
}

// Load submitters on page init (to validate PIN faster)
loadSubmitters();
</script>
</body>
</html>
